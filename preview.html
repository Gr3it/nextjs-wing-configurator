<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Preview Sandbox</title>
    <script type="module">
      import { config } from "./config.js";
      const version = config.preview.modelViewerVersion || "3.4.0";
      const script = document.createElement("script");
      script.type = "module";
      script.src = `https://ajax.googleapis.com/ajax/libs/model-viewer/${version}/model-viewer.min.js`;
      document.head.appendChild(script);
    </script>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: #09090b;
        color: #fafafa;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header {
        padding: 0.8rem 1rem;
        background: #18181b;
        border-bottom: 1px solid #27272a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .main-container {
        display: flex;
        flex: 1;
      }
      .viewer-container {
        flex: 1;
        position: relative;
        background: #050505;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      model-viewer {
        width: 100%;
        height: 100%;
        background-color: #050505;
        --poster-color: transparent;
      }
      .controls {
        width: 320px;
        background: #18181b;
        border-left: 1px solid #27272a;
        padding: 1.2rem;
        overflow-y: auto;
      }
      .control-group {
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #27272a;
      }
      label {
        display: block;
        font-size: 0.7rem;
        color: #a1a1aa;
        margin-bottom: 0.4rem;
        font-weight: 700;
        text-transform: uppercase;
      }
      input[type="range"] {
        width: 100%;
        accent-color: #a3e635;
        margin-bottom: 5px;
      }
      .value-display {
        font-family: monospace;
        font-size: 0.75rem;
        color: #a3e635;
        float: right;
      }
      .code-output {
        background: #000;
        padding: 0.8rem;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.75rem;
        color: #a3e635;
        border: 1px solid #3f3f46;
        margin-top: 5px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .btn {
        background: #27272a;
        color: #fff;
        border: 1px solid #3f3f46;
        padding: 0.5rem;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        font-weight: bold;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #3f3f46;
      }
    </style>
  </head>
  <body>
    <header>
      <div style="font-weight: bold">3D Preview Sandbox</div>
      <div style="font-size: 0.7rem; color: #52525b">
        A1_arm_static_angled_large
      </div>
    </header>

    <div class="main-container">
      <div class="viewer-container">
        <model-viewer
          id="mv"
          src="./public/models/parts/A1_arm_static_angled_large-transformed.glb"
          exposure="0.6"
          camera-orbit="0deg 75deg 20%"
          min-camera-orbit="-180deg -180deg 0%"
          max-camera-orbit="180deg 180deg 300%"
          field-of-view="50deg"
          min-field-of-view="0deg"
          max-field-of-view="180deg"
        ></model-viewer>
      </div>

      <div class="controls">
        <div class="control-group">
          <label
            >Exposure <span id="exp-v" class="value-display">0.6</span></label
          >
          <input
            type="range"
            id="exp"
            min="0"
            max="2"
            step="0.01"
            value="0.6"
          />
        </div>

        <div class="control-group">
          <label>FOV <span id="fov-v" class="value-display">50</span>°</label>
          <input type="range" id="fov" min="1" max="100" step="1" value="50" />
        </div>

        <div class="control-group">
          <label
            >Theta (H) <span id="the-v" class="value-display">0</span>°</label
          >
          <input
            type="range"
            id="the"
            min="-180"
            max="180"
            step="1"
            value="0"
          />

          <label style="margin-top: 10px"
            >Phi (V) <span id="phi-v" class="value-display">75</span>°</label
          >
          <input type="range" id="phi" min="0" max="180" step="1" value="75" />

          <label style="margin-top: 10px"
            >Distance <span id="rad-v" class="value-display">100</span>%</label
          >
          <input type="range" id="rad" min="0" max="300" step="1" value="100" />
        </div>

        <div class="control-group">
          <button class="btn" id="reset">RESET PARAMETERS</button>
        </div>

        <div>
          <label>Config String:</label>
          <pre id="output" class="code-output"></pre>
        </div>
      </div>
    </div>

    <script type="module">
      import { config } from "./config.js";

      const mv = document.getElementById("mv");
      const preview = config.preview;
      const output = document.getElementById("output");

      const inputs = {
        exp: {
          el: document.getElementById("exp"),
          val: document.getElementById("exp-v"),
        },
        fov: {
          el: document.getElementById("fov"),
          val: document.getElementById("fov-v"),
        },
        the: {
          el: document.getElementById("the"),
          val: document.getElementById("the-v"),
        },
        phi: {
          el: document.getElementById("phi"),
          val: document.getElementById("phi-v"),
        },
        rad: {
          el: document.getElementById("rad"),
          val: document.getElementById("rad-v"),
        },
      };

      function update() {
        if (!mv) return;

        const v = {
          exp: inputs.exp.el.value,
          fov: inputs.fov.el.value,
          the: inputs.the.el.value,
          phi: inputs.phi.el.value,
          rad: inputs.rad.el.value,
        };

        // Update model-viewer attributes
        mv.exposure = parseFloat(v.exp);
        mv.fieldOfView = `${v.fov}deg`;
        mv.cameraOrbit = `${v.the}deg ${v.phi}deg ${v.rad}%`;

        // Update value displays
        Object.keys(inputs).forEach((key) => {
          inputs[key].val.textContent = v[key];
        });

        // Update output string
        output.textContent = [
          `camera-orbit="${v.the}deg ${v.phi}deg ${v.rad}%"`,
          `field-of-view="${v.fov}deg"`,
          `exposure="${v.exp}"`,
          `environment-rotation="0deg ${preview.lightRotation}deg 0deg"`,
          `shadow-intensity="${mv.shadowIntensity}"`,
          `environment-image="${mv.environmentImage}"`,
        ].join("\n");
      }

      function init() {
        inputs.exp.el.value = preview.exposure;
        inputs.fov.el.value = preview.fieldOfView;
        inputs.the.el.value = preview.cameraOrbit.theta;
        inputs.phi.el.value = preview.cameraOrbit.phi;
        inputs.rad.el.value = preview.cameraOrbit.radius;

        mv.shadowIntensity = preview.shadowIntensity;
        mv.environmentImage = preview.environmentImage;
        mv.environmentRotation = `0deg ${preview.lightRotation}deg 0deg`;

        update();
      }

      // Event Listeners
      Object.values(inputs).forEach(({ el }) =>
        el.addEventListener("input", update),
      );

      mv.addEventListener("camera-change", (e) => {
        if (e.detail.source === "user-interaction") {
          const orbit = mv.getCameraOrbit();
          inputs.the.el.value = Math.round(orbit.theta * (180 / Math.PI));
          inputs.phi.el.value = Math.round(orbit.phi * (180 / Math.PI));
          inputs.rad.el.value = Math.round(orbit.radius * 100);
          update();
        }
      });

      document.getElementById("reset").addEventListener("click", init);
      mv.addEventListener("load", update);

      init();
    </script>
  </body>
</html>
